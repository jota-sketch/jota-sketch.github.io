<!DOCTYPE html>
<html>
<head>
    <title>Primeira Aula</title>

    <style>
        body {
            background-color: #a06602;
            color: #2b2b2b;
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        h1 {
            color: #111;
            font-size: 48px;
            margin-top: 60px;
        }

        h2 {
            color: #800808;
            font-weight: normal;
            margin-bottom: 20px;
        }

        .descricao {
            color: rgba(133, 20, 20, 0.644);
            font-size: 20px;
        }

         button {
            color: rgb(201, 90, 0);
            background-color: rgb(75, 46, 7);
            font-size: 16px;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            transition: 0.3s;
            cursor: pointer;
        }
       
        button:hover { 
         background-color: #7e1313a4;
         cursor: pointer;
         transform: scale(1.05);
        
        }
        
        .container {
           display: flex;
          justify-content: center;
          align-items: center;
          gap: 30px;
          margin-top: 60px;

        }

        .card {
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #ffffff;
        padding: 30px 50px;
        border-radius: 12px;
        font-size: 22px;
        transition: 0.3s;
        cursor: pointer;
        height: 120px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .card:hover {
         transform: translateY(-5px);
         background-color: #333;
        }
</style>

</head>

<body>

<h1>JOTA</h1>
<h2>Desenvolvedor Front-End em formação</h2>

<p class="descricao">Esse é começo de uma Gande Caminhada.</p>

<p>Desenvolvedor em evolução constante, focado em criar experiências modernas e funcionais.</p>

<button>SAIBA MAIS</button>
<div class="container">
    <div class="card">HTML</div>
    <div class="card">CSS</div>
    <div class="card">JavaScript</div>
</div>

</body>
</html>
